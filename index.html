<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Help Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background: #222;
      color: white;
      padding: 10px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav a {
      color: white;
      text-decoration: none;
    }
    main {
      padding: 20px;
    }
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 10px;
    }
    .dark {
      background-color: #111;
      color: #eee;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="articles/Windows/bootloader.html">Windows</a></li>
        <li><a href="articles/Ubuntu/wifi_ubuntu.html">Ubuntu (Linux)</a></li>
        <li><a href="articles/Chromebooks/battery.html">Chromebooks</a></li>
        <li><a href="articles/MacOS/boot.html">macOS</a></li>
      </ul>
      <button id="theme-toggle">Theme: System</button>
    </nav>
  </header>

  <main>
    <h1>Welcome to Tech Help Hub</h1>
    <p>Select your OS above to see common problems and fixes.</p>
  </main>

  <footer>
    <p>© 2026 Tech Help Hub</p>
  </footer>

  <script>
    const button = document.getElementById("theme-toggle");
    button.addEventListener("click", () => {
      if (document.body.classList.contains("dark")) {
        document.body.classList.remove("dark");
        button.textContent = "Theme: System";
      } else {
        document.body.classList.add("dark");
        button.textContent = "Theme: Dark";
      }
    });
  </script>
</body>
</html>
